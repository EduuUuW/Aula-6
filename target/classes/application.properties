# ============================================================
#  Configurações da Aplicação
# ============================================================
spring.application.name=contatos-api

# ============================================================
#  Banco de Dados H2 (em memória)
# ============================================================
spring.datasource.url=jdbc:h2:mem:contatosdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Console H2 (acesse: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
#  JPA / Hibernate
# ============================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# create-drop: recria o schema a cada reinicialização
spring.jpa.hibernate.ddl-auto=create-drop
# Exibe as queries SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
#  Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
spring.jpa.defer-datasource-initialization=true

# ============================================================
#  Servidor
# ============================================================
server.port=8080
